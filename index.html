<!DOCTYPE html>
<html>
<head>
  <title>Affiliate Master Tool</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 600px; }
    input { margin-bottom: 10px; width: 100%; padding: 5px; }
    button { padding: 10px; width: 100%; font-weight: bold; }
    h2 { margin-top: 30px; }
  </style>
</head>
<body>

<h1>🔥 Affiliate Master Tool</h1>

<h2>1️⃣ Screening Produk</h2>
Harga Produk (Rp):
<input type="number" id="harga">

Komisi (%):
<input type="number" id="komisi">

Total Terjual:
<input type="number" id="terjual">

Rating:
<input type="number" step="0.1" id="rating">

<button onclick="screening()">Cek Kelayakan</button>

<h3 id="hasilScreening"></h3>

<h2>2️⃣ Simulasi Income Video</h2>
Target View Video:
<input type="number" id="view">

Estimasi CTR ke Produk (%):
<input type="number" id="ctr">

Estimasi Conversion Rate (%):
<input type="number" id="cr">

<button onclick="hitungIncome()">Hitung Potensi Income</button>

<h3 id="hasilIncome"></h3>

<script>

function screening() {
  let harga = parseFloat(document.getElementById("harga").value);
  let komisi = parseFloat(document.getElementById("komisi").value) / 100;
  let terjual = parseInt(document.getElementById("terjual").value);
  let rating = parseFloat(document.getElementById("rating").value);

  let fee = harga * komisi;

  if (fee >= 15000 && terjual >= 1000 && rating >= 4.7) {
    document.getElementById("hasilScreening").innerHTML =
      "GAS 🔥 Produk Layak! Estimasi Fee per Sale: Rp " + fee.toLocaleString();
  } else {
    document.getElementById("hasilScreening").innerHTML =
      "SKIP ❌ Produk Kurang Ideal. Estimasi Fee: Rp " + fee.toLocaleString();
  }
}

function hitungIncome() {
  let harga = parseFloat(document.getElementById("harga").value);
  let komisi = parseFloat(document.getElementById("komisi").value) / 100;
  let view = parseInt(document.getElementById("view").value);
  let ctr = parseFloat(document.getElementById("ctr").value) / 100;
  let cr = parseFloat(document.getElementById("cr").value) / 100;

  let klik = view * ctr;
  let sales = klik * cr;
  let fee = harga * komisi;
  let income = sales * fee;

  document.getElementById("hasilIncome").innerHTML =
    "Estimasi Klik: " + Math.round(klik) +
    "<br>Estimasi Sales: " + Math.round(sales) +
    "<br>Estimasi Income: Rp " + income.toLocaleString();
}

</script>

</body>
</html>

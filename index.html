<script>

const API_KEY="AIzaSyAbCw7li3GJ6ZiZz26V2T3RmlKYufbI68c"

/* ================= GENERATE ================= */

async function generate(){

let nama=document.getElementById("nama").value
let harga=document.getElementById("harga").value
let rating=document.getElementById("rating").value
let terjual=document.getElementById("terjual").value

if(!nama){
alert("Isi nama produk dulu")
return
}

document.getElementById("output").innerHTML="AI sedang membuat script..."

let prompt=`
Buatkan script konten video affiliate Shopee yang menarik dan tidak kaku.

Data produk:
Nama produk: ${nama}
Harga: ${harga}
Rating: ${rating}
Terjual: ${terjual}

Buat dengan format:

HOOK
VOICEOVER
TEKS VIDEO
JUDUL VIDEO
CAPTION
HASHTAG

Gunakan bahasa santai seperti kreator TikTok Indonesia.
`

try{

let response=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[{
parts:[{text:prompt}]
}]
})
})

let data=await response.json()

if(!data.candidates){
throw new Error("AI error")
}

let hasil=data.candidates[0].content.parts[0].text

/* tampilkan */

document.getElementById("output").innerHTML=`

<div class="result green">

<h4>Script dari AI</h4>

<pre>${hasil}</pre>

</div>
`

/* kirim ke sheet */

fetch("https://script.google.com/macros/s/AKfycbxrUCoBw0FS4zLUH9rkvYmX_2wsp1giK-jOAkI27oVuBV8CBPHWAdzE8l-carVx631t/exec",{

method:"POST",
mode:"no-cors",

body:JSON.stringify({

nama:nama,
harga:harga,
rating:rating,
terjual:terjual,
script:hasil

})

})

}catch(e){

/* ================= FALLBACK SCRIPT ================= */

let hooks=[
`Baru tau ternyata ada ${nama} kayak gini.`,
`Serius baru nemu produk ini sekarang.`,
`Awalnya kupikir ini produk biasa.`,
`Ternyata ada barang kayak gini juga.`,
`Ini kecil tapi ternyata kepake banget.`
]

let hook=hooks[Math.floor(Math.random()*hooks.length)]

let voiceover=hook + `

Awalnya kupikir ini cuma produk biasa.

Tapi ternyata cukup membantu dipakai di rumah.

Harganya sekitar Rp ${harga}.

Ratingnya ${rating} dan yang beli sudah ${terjual}+.

Linknya aku taruh di keranjang.
`

let teksVideo=`
Produk simpel tapi kepake

Harga Rp ${harga}

Rating ${rating}

Terjual ${terjual}+

Cek keranjang
`

let judul=`Produk yang ternyata kepake banget`

let caption=`Barang kecil tapi ternyata sering dipakai.`

let hashtag=`#racunshopee #produkviral #shopeeaffiliate`

document.getElementById("output").innerHTML=`

<div class="result orange">

<h4>Script Fallback</h4>

<pre>

VOICEOVER
${voiceover}

TEKS VIDEO
${teksVideo}

JUDUL VIDEO
${judul}

CAPTION
${caption}

HASHTAG
${hashtag}

</pre>

</div>
`

}

}

</script>

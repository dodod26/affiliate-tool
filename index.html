<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GaptekNiih Home Viral Scanner PRO</title>

<style>
body{font-family:Arial;margin:0;background:#f3f4f6;}
header{background:#111827;color:white;text-align:center;padding:20px;}
.container{max-width:900px;margin:auto;padding:15px;}
.card{background:white;padding:15px;margin-bottom:15px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
input{width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ddd;}
button{padding:10px;background:#2563eb;color:white;border:none;border-radius:6px;cursor:pointer;margin-top:5px;}
.result{padding:10px;border-radius:8px;margin-top:10px;}
.green{background:#dcfce7;}
.orange{background:#fef3c7;}
.red{background:#fee2e2;}
pre{white-space:pre-wrap;}
footer{text-align:center;padding:15px;font-size:12px;opacity:0.6;}
</style>
</head>

<body>

<header>
<div style="font-size:24px;font-weight:bold;">GaptekNiih</div>
<div style="font-size:14px;opacity:0.7;">Home Viral Scanner AUTO VARIASI</div>
</header>

<div class="container">
<div class="card">

<h3>Input Data Produk</h3>

<input id="nama" placeholder="Nama Produk">
<input id="harga" type="number" placeholder="Harga">
<input id="komisi" type="number" placeholder="Komisi %">
<input id="rating" type="number" step="0.1" placeholder="Rating">
<input id="terjual" type="number" placeholder="Jumlah Terjual">
<input id="kompetitor" type="number" placeholder="Perkiraan Kompetitor">

<button onclick="analisa()">Analisa & Buat Script</button>
<button onclick="generateHookBaru()">Generate Hook Baru Lagi</button>

<div id="output"></div>

</div>
</div>

<footer>Dibuat oleh GaptekNiih</footer>

<script>

let globalData = {};
let globalStatus = "";
let globalWarna = "";

/* ============================= */

async function kirimKeSheet(nama,harga,rating,terjual,script,status){

const url = "https://script.google.com/macros/s/AKfycbxrUCoBw0FS4zLUH9rkvYmX_2wsp1giK-jOAkI27oVuBV8CBPHWAdzE8l-carVx631t/exec";

const data = {
  nama: nama,
  harga: harga,
  rating: rating,
  terjual: terjual,
  masalah: "Rumah tangga",
  script: script,
  status: status
};

await fetch(url,{
  method:"POST",
  mode:"no-cors",
  body: JSON.stringify(data)
});

}

/* ============================= */

function analisa(){

let nama = document.getElementById("nama").value;
let harga = parseFloat(document.getElementById("harga").value);
let komisi = parseFloat(document.getElementById("komisi").value);
let rating = parseFloat(document.getElementById("rating").value);
let terjual = parseFloat(document.getElementById("terjual").value);
let kompetitor = parseFloat(document.getElementById("kompetitor").value);

let skor = 0;
if(harga <= 200000) skor += 20;
if(komisi >= 10) skor += 20;
if(rating >= 4.7) skor += 20;
if(terjual >= 500) skor += 20;
if(kompetitor <= 200) skor += 20;

if(skor >= 80){
globalStatus="POTENSI VIRAL KUAT";
globalWarna="green";
}
else if(skor >= 50){
globalStatus="LAYAK DICOBA";
globalWarna="orange";
}
else{
globalStatus="RESIKO TINGGI";
globalWarna="red";
}

globalData = {nama,harga,rating,terjual};

generateHookBaru();
}

/* ============================= */

function generateHookBaru(){

if(!globalData.nama){
alert("Isi dulu datanya dan klik Analisa ya.");
return;
}

let variations = [

function(){
return {
voice: `
Belakangan ini ada satu detail kecil di rumah yang cukup mengganggu.

Awalnya terlihat sepele.
Namun lama-lama terasa juga dampaknya dalam aktivitas sehari-hari.

Akhirnya banyak orang mulai mencari solusi yang lebih praktis.
Salah satunya dengan menggunakan ${globalData.nama}.

Penggunaannya sederhana.
Tidak ribet.
Dan cukup membantu membuat area terasa lebih rapi.

Harganya sekitar Rp ${globalData.harga}.
Ratingnya ${globalData.rating}.
Sudah terjual lebih dari ${globalData.terjual} unit.

Jika kamu ingin solusi yang lebih praktis di rumah,
produk ini bisa jadi salah satu pertimbangan.
`,
overlay: `
TEKS OVERLAY SHOPEE

0–3 detik:
Detail kecil, efek besar

3–10 detik:
Sering bikin area kurang rapi

10–20 detik:
Solusi praktis dan tidak ribet

20–27 detik:
Harga terjangkau, rating tinggi

27–30 detik:
Cek detailnya di keranjang
`
}
},

function(){
return {
voice: `
Kadang kenyamanan di rumah terganggu hanya karena hal sederhana.

Tidak terasa penting di awal.
Tapi cukup memengaruhi aktivitas sehari-hari.

Karena itu banyak orang beralih ke solusi yang lebih efisien,
seperti ${globalData.nama} ini.

Desainnya simpel.
Mudah digunakan.
Dan membantu membuat semuanya lebih tertata.

Dengan harga sekitar Rp ${globalData.harga},
rating ${globalData.rating},
dan penjualan lebih dari ${globalData.terjual} unit,

produk ini cukup menarik untuk dipertimbangkan.
`,
overlay: `
TEKS OVERLAY SHOPEE

0–3 detik:
Awalnya terlihat biasa

3–10 detik:
Ternyata cukup mengganggu

10–20 detik:
Lebih praktis digunakan

20–27 detik:
Sudah banyak yang pakai

27–30 detik:
Lihat informasinya di link
`
}
}

];

let randomVariation = variations[Math.floor(Math.random()*variations.length)];
let result = randomVariation();

let finalOutput = `
SCRIPT VOICE OVER

${result.voice}

${result.overlay}
`;

document.getElementById("output").innerHTML = `
<div class="result ${globalWarna}">
<b>Status:</b> ${globalStatus}<br><br>
<pre>${finalOutput}</pre>
</div>
`;

kirimKeSheet(
globalData.nama,
globalData.harga,
globalData.rating,
globalData.terjual,
result.voice,
globalStatus
);

}

</script>
</body>
</html>

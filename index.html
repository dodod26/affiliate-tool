<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GaptekNiih Home Viral Scanner</title>
<style>
body{font-family:Arial;margin:0;background:#f3f4f6;}
header{background:#111827;color:white;text-align:center;padding:20px;}
.container{max-width:900px;margin:auto;padding:15px;}
.card{background:white;padding:15px;margin-bottom:15px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
input,select,textarea{width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ddd;}
button{padding:10px;background:#2563eb;color:white;border:none;border-radius:6px;cursor:pointer;}
.result{padding:10px;border-radius:8px;margin-top:10px;}
.green{background:#dcfce7;}
.orange{background:#fef3c7;}
.red{background:#fee2e2;}
footer{text-align:center;padding:15px;font-size:12px;opacity:0.6;}
</style>
</head>

<body>

<header>
<div style="font-size:24px;font-weight:bold;">GaptekNiih</div>
<div style="font-size:14px;opacity:0.7;">Home Viral Scanner PRO</div>
</header>

<div class="container">

<div class="card">
<h3>Input Data Produk Rumah Tangga</h3>

<input id="nama" placeholder="Nama Produk">
<input id="harga" type="number" placeholder="Harga (contoh: 120000)">
<input id="komisi" type="number" placeholder="Komisi % (contoh: 15)">
<input id="rating" type="number" step="0.1" placeholder="Rating (contoh: 4.8)">
<input id="terjual" type="number" placeholder="Jumlah Terjual (contoh: 1200)">
<input id="kompetitor" type="number" placeholder="Perkiraan Kompetitor (contoh: 150)">

<button onclick="analisa()">Analisa Sekarang</button>

<div id="output"></div>

</div>

</div>

<footer>
Dibuat oleh GaptekNiih
</footer>

<script>

function analisa(){
  async function kirimKeSheet(nama,harga,rating,terjual,script,status){

const url = "https://script.google.com/macros/library/d/1vHrCC0fN9DVZZxVKQRZm9QwFfSXAmfvQcR1kNlqNW26e0BHrAic11_2T/4";

const data = {
  nama: nama,
  harga: harga,
  rating: rating,
  terjual: terjual,
  masalah: "Rumah tangga",
  script: script,
  status: status
};

await fetch(url,{
  method:"POST",
  headers:{
    "Content-Type":"application/json"
  },
  body: JSON.stringify(data)
});

}

let nama = document.getElementById("nama").value;
let harga = parseFloat(document.getElementById("harga").value);
let komisi = parseFloat(document.getElementById("komisi").value);
let rating = parseFloat(document.getElementById("rating").value);
let terjual = parseFloat(document.getElementById("terjual").value);
let kompetitor = parseFloat(document.getElementById("kompetitor").value);

let skor = 0;

// LOGIKA KHUSUS RUMAH TANGGA
if(harga <= 200000) skor += 20;
if(komisi >= 10) skor += 20;
if(rating >= 4.7) skor += 20;
if(terjual >= 500) skor += 20;
if(kompetitor <= 200) skor += 20;

let status = "";
let warna = "";
let angle = "";
let hook = "";
let script = "";

if(skor >= 80){
status = "🟢 POTENSI VIRAL KUAT";
warna = "green";
angle = "Fokus ke kemudahan & solusi masalah sehari-hari.";
hook = "Stop scroll! Ini solusi simpel yang banyak orang belum tahu.";
}
else if(skor >= 50){
status = "🟡 LAYAK DICOBA";
warna = "orange";
angle = "Fokus ke harga terjangkau & fungsi praktis.";
hook = "Produk ini ternyata cukup membantu lho.";
}
else{
status = "🔴 RESIKO TINGGI";
warna = "red";
angle = "Kurang kuat untuk konten massal, kecuali ada angle unik.";
hook = "Banyak yang belum tahu soal produk ini.";
}

script = `
🎬 HOOK:
${hook}

😩 MASALAH:
Kadang hal kecil di rumah bikin ribet tanpa kita sadar.

✨ SOLUSI:
${nama} ini bisa jadi solusi praktis untuk masalah itu.

🔥 FAKTA PRODUK:
Harga sekitar Rp ${harga}
Rating ${rating}
Sudah terjual ${terjual}+ unit

🎯 ANGLE KONTEN:
${angle}

💰 CTA:
Kalau lagi cari yang seperti ini, cek link di keranjang sebelum kehabisan.
`;

  kirimKeSheet(nama,harga,rating,terjual,script,status);
  
document.getElementById("output").innerHTML = `
<div class="result ${warna}">
<b>Skor:</b> ${skor}/100<br>
<b>Status:</b> ${status}<br><br>
<pre style="white-space:pre-wrap;">${script}</pre>
</div>
`;

}

</script>

</body>
</html>

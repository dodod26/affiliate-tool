<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GaptekNiih Home Viral Scanner PRO</title>

<style>
body{font-family:Arial;margin:0;background:#f3f4f6;}
header{background:#111827;color:white;text-align:center;padding:20px;}
.container{max-width:900px;margin:auto;padding:15px;}
.card{background:white;padding:15px;margin-bottom:15px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
input{width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ddd;}
button{padding:10px;background:#2563eb;color:white;border:none;border-radius:6px;cursor:pointer;margin-top:5px;}
.result{padding:10px;border-radius:8px;margin-top:10px;}
.green{background:#dcfce7;}
.orange{background:#fef3c7;}
.red{background:#fee2e2;}
pre{white-space:pre-wrap;}
footer{text-align:center;padding:15px;font-size:12px;opacity:0.6;}
</style>
</head>

<body>

<header>
<div style="font-size:24px;font-weight:bold;">GaptekNiih</div>
<div style="font-size:14px;opacity:0.7;">Home Viral Scanner AUTO VARIASI</div>
</header>

<div class="container">
<div class="card">

<h3>Input Data Produk</h3>

<input id="nama" placeholder="Nama Produk">
<input id="harga" type="number" placeholder="Harga">
<input id="komisi" type="number" placeholder="Komisi %">
<input id="rating" type="number" step="0.1" placeholder="Rating">
<input id="terjual" type="number" placeholder="Jumlah Terjual">
<input id="kompetitor" type="number" placeholder="Perkiraan Kompetitor">

<button onclick="analisa()">Analisa & Buat Script</button>
<button onclick="generateHookBaru()">Generate Hook Baru Lagi</button>

<div id="output"></div>

</div>
</div>

<footer>Dibuat oleh GaptekNiih</footer>

<script>

let globalData = {};
let globalStatus = "";
let globalWarna = "";

/* ============================= */

async function kirimKeSheet(nama,harga,rating,terjual,script,status){

const url = "https://script.google.com/macros/s/AKfycbxrUCoBw0FS4zLUH9rkvYmX_2wsp1giK-jOAkI27oVuBV8CBPHWAdzE8l-carVx631t/exec";

const data = {
  nama: nama,
  harga: harga,
  rating: rating,
  terjual: terjual,
  masalah: "Rumah tangga",
  script: script,
  status: status
};

await fetch(url,{
  method:"POST",
  mode:"no-cors",
  body: JSON.stringify(data)
});

}

/* ============================= */

function analisa(){

let nama = document.getElementById("nama").value;
let harga = parseFloat(document.getElementById("harga").value);
let komisi = parseFloat(document.getElementById("komisi").value);
let rating = parseFloat(document.getElementById("rating").value);
let terjual = parseFloat(document.getElementById("terjual").value);
let kompetitor = parseFloat(document.getElementById("kompetitor").value);

let skor = 0;
if(harga <= 200000) skor += 20;
if(komisi >= 10) skor += 20;
if(rating >= 4.7) skor += 20;
if(terjual >= 500) skor += 20;
if(kompetitor <= 200) skor += 20;

if(skor >= 80){
globalStatus="POTENSI VIRAL KUAT";
globalWarna="green";
}
else if(skor >= 50){
globalStatus="LAYAK DICOBA";
globalWarna="orange";
}
else{
globalStatus="RESIKO TINGGI";
globalWarna="red";
}

globalData = {nama,harga,rating,terjual};

generateHookBaru();
}

/* ============================= */

function generateHookBaru(){

if(!globalData.nama){
alert("Isi dulu datanya dan klik Analisa ya 😁");
return;
}

let hooks = [
`Jujur aku baru tau ada ${globalData.nama} kayak gini.`,
`Awalnya kupikir ${globalData.nama} ini biasa aja.`,
`Serius ini baru nemu sekarang.`,
`Ternyata ada produk kayak gini juga.`,
`Ini kecil tapi ternyata cukup kepake.`
];

let ctas = [
`Kalau kamu butuh, cek link di keranjang.`,
`Aku taruh link produknya di keranjang.`,
`Kalau penasaran bisa cek langsung.`,
`Link produknya ada di keranjang ya.`,
`Bisa cek detailnya di link keranjang.`
];

let randomHook = hooks[Math.floor(Math.random()*hooks.length)];
let randomCTA = ctas[Math.floor(Math.random()*ctas.length)];

let voiceover = `
${randomHook}

Awalnya kupikir ini cuma produk biasa.

Tapi ternyata cukup membantu buat dipakai di rumah.

Apalagi harganya cuma sekitar Rp ${globalData.harga}.

Ratingnya juga ${globalData.rating} dan yang beli sudah lebih dari ${globalData.terjual}.

Jadi cukup menarik juga buat dicoba.

${randomCTA}
`;

let teksVideo = `
Produk simpel tapi kepake

Harga Rp ${globalData.harga}
Rating ${globalData.rating}

Sudah dibeli ${globalData.terjual}+

Cek keranjang sekarang
`;

let judulShopee = `
Produk rumah tangga yang ternyata kepake banget
`;

let caption = `
Baru tau ternyata ada produk kayak gini.

Harganya masih terjangkau dan yang beli sudah banyak juga.

Kalau kamu lagi cari solusi praktis di rumah, ini menarik buat dicoba.
`;

let hashtag = `
#racunshopee
#shopeefinds
#produkviral
#belanjashopee
#shopeeaffiliate
`;

let scriptGabung = voiceover;

document.getElementById("output").innerHTML = `
<div class="result ${globalWarna}">
<b>Status:</b> ${globalStatus}<br><br>

<b>🎙 Voice Over</b>
<pre>${voiceover}</pre>

<b>📝 Teks Video</b>
<pre>${teksVideo}</pre>

<b>🎬 Judul Shopee Video</b>
<pre>${judulShopee}</pre>

<b>📄 Caption</b>
<pre>${caption}</pre>

<b>🔥 Hashtag</b>
<pre>${hashtag}</pre>

</div>
`;

kirimKeSheet(
globalData.nama,
globalData.harga,
globalData.rating,
globalData.terjual,
scriptGabung,
globalStatus
);

}

</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GaptekNiih Viral Scanner AI</title>

<style>
body{font-family:Arial;margin:0;background:#f3f4f6;}
header{background:#111827;color:white;text-align:center;padding:20px;}
.container{max-width:900px;margin:auto;padding:15px;}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
input{width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ddd;}
button{padding:10px;background:#2563eb;color:white;border:none;border-radius:6px;margin-top:5px;cursor:pointer;}
.result{padding:15px;border-radius:10px;margin-top:15px;}
.green{background:#dcfce7;}
pre{white-space:pre-wrap;}
</style>
</head>

<body>

<header>
<h2>GaptekNiih Viral Scanner</h2>
<p>Shopee Affiliate AI Script Generator</p>
</header>

<div class="container">
<div class="card">

<h3>Input Data Produk</h3>

<input id="nama" placeholder="Nama Produk">
<input id="harga" placeholder="Harga">
<input id="rating" placeholder="Rating">
<input id="terjual" placeholder="Jumlah Terjual">

<button onclick="generate()">Generate Script AI</button>

<div id="output"></div>

</div>
</div>

<script>

const API_KEY="AIzaSyCxAJJi43YzliNk_T6s39TbAux7jX8yEbM"

/* ================= GENERATE ================= */

async function generate(){

let nama=document.getElementById("nama").value
let harga=document.getElementById("harga").value
let rating=document.getElementById("rating").value
let terjual=document.getElementById("terjual").value

if(!nama){
alert("Isi nama produk dulu")
return
}

document.getElementById("output").innerHTML="AI sedang membuat script..."

let prompt=`
Buatkan script konten video affiliate shopee yang viral.

Produk: ${nama}
Harga: ${harga}
Rating: ${rating}
Terjual: ${terjual}

Format:

HOOK
VOICE OVER
TEKS VIDEO
JUDUL VIDEO
CAPTION
HASHTAG

Gunakan gaya bahasa santai seperti kreator TikTok Indonesia.
`

try{

let response=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[{
parts:[{text:prompt}]
}]
})
})

let data=await response.json()

let hasil=""

if(data.candidates){
hasil=data.candidates[0].content.parts[0].text
}else{
throw new Error("AI gagal")
}

tampilkan(hasil)

kirimSheet(nama,harga,rating,terjual,hasil)

}catch(e){

console.log("AI gagal, pakai fallback")

fallbackScript(nama,harga,rating,terjual)

}

}

/* ================= FALLBACK ================= */

function fallbackScript(nama,harga,rating,terjual){

let hooks=[
`Baru tau ternyata ada ${nama} kayak gini.`,
`Serius baru nemu produk ini sekarang.`,
`Awalnya kupikir ini produk biasa.`,
`Ternyata ada barang kayak gini juga.`,
`Ini kecil tapi ternyata kepake banget.`
]

let ctas=[
`Linknya aku taruh di keranjang.`,
`Kalau penasaran cek link keranjang.`,
`Detail produk ada di keranjang.`,
`Bisa cek produknya di keranjang.`,
`Linknya ada di bawah ya.`
]

let captions=[
`Produk simpel tapi ternyata membantu.`,
`Barang kecil tapi sering kepake.`,
`Ini salah satu produk underrated.`,
`Kadang solusi itu simpel.`,
`Produk kecil tapi kepake banget.`
]

let hashtags=[
`#racunshopee #produkviral #shopeefinds`,
`#racunshopee #barangviral #shopeeaffiliate`,
`#racunshopee #belanjashopee #produkviral`
]

let hook=hooks[Math.floor(Math.random()*hooks.length)]
let cta=ctas[Math.floor(Math.random()*ctas.length)]
let caption=captions[Math.floor(Math.random()*captions.length)]
let hashtag=hashtags[Math.floor(Math.random()*hashtags.length)]

let voiceover=hook + `

Awalnya kupikir ini cuma produk biasa.

Tapi ternyata cukup membantu dipakai.

Harganya sekitar Rp ${harga}.

Ratingnya ${rating} dan yang beli sudah ${terjual}+.

` + cta

let teksVideo=`
Produk simpel tapi kepake

Harga Rp ${harga}

Rating ${rating}

Terjual ${terjual}+

Cek keranjang
`

let judul=`Produk yang ternyata kepake banget`

let hasil=`

VOICE OVER
${voiceover}

TEKS VIDEO
${teksVideo}

JUDUL VIDEO
${judul}

CAPTION
${caption}

HASHTAG
${hashtag}

`

tampilkan(hasil)

kirimSheet(nama,harga,rating,terjual,hasil)

}

/* ================= TAMPILKAN ================= */

function tampilkan(teks){

document.getElementById("output").innerHTML=`

<div class="result green">

<h4>Hasil Script</h4>

<pre>${teks}</pre>

</div>
`

}

/* ================= KIRIM SHEET ================= */

function kirimSheet(nama,harga,rating,terjual,hasil){

fetch("https://script.google.com/macros/s/AKfycbxrUCoBw0FS4zLUH9rkvYmX_2wsp1giK-jOAkI27oVuBV8CBPHWAdzE8l-carVx631t/exec",{

method:"POST",
mode:"no-cors",

body:JSON.stringify({

nama:nama,
harga:harga,
rating:rating,
terjual:terjual,
script:hasil

})

})

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affiliate Control Room</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}
header{
background:#1f2937;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}
.container{
padding:15px;
max-width:900px;
margin:auto;
}
.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
input,select{
width:100%;
padding:8px;
margin:5px 0;
}
button{
padding:10px;
border:none;
background:#2563eb;
color:white;
border-radius:5px;
cursor:pointer;
}
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}
th,td{
border:1px solid #ddd;
padding:8px;
font-size:12px;
}
.progress{
height:20px;
background:#ddd;
border-radius:10px;
overflow:hidden;
}
.progress-bar{
height:100%;
background:#10b981;
width:0%;
}
</style>
</head>
<body>

<header style="text-align:center;">
<div style="font-size:22px;font-weight:bold;">
GaptekNiih
</div>
<div style="font-size:13px;opacity:0.7;margin-top:3px;">
Affiliate Control Room
</div>
<div style="font-size:11px;opacity:0.5;margin-top:5px;">
Dibuat oleh GaptekNiih
</div>
</header>

<div class="container">

<div class="card">
<h3>Target 10 Juta</h3>
<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>
<p id="targetText"></p>
</div>

<div class="card">
<h3>Tambah Produk</h3>
<input id="nama" placeholder="Nama Produk">
<select id="kategori">
<option>Fashion</option>
<option>Beauty</option>
<option>Gadget</option>
<option>Rumah Tangga</option>
<option>Viral</option>
</select>
<input id="harga" type="number" placeholder="Harga">
<input id="komisi" type="number" placeholder="Komisi %">
<input id="rating" type="number" step="0.1" placeholder="Rating (1-5)">
<input id="terjual" type="number" placeholder="Jumlah Terjual">
<input id="kompetitor" type="number" placeholder="Jumlah Kompetitor">
<button onclick="tambahProduk()">Simpan</button>
</div>

<div class="card">
<h3>Daftar Produk</h3>
<table>
<thead>
<tr>
<th>Nama</th>
<th>Kat</th>
<th>Skor</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>
</div>

<div class="card">
<h3>Generator Script Cepat</h3>

<input id="namaScript" placeholder="Nama Produk">

<textarea id="kelebihanScript" placeholder="Tulis kelebihan produk (pisahkan dengan koma)" style="width:100%;height:80px;"></textarea>

<button onclick="buatScript()">Buat Script</button>

<pre id="hasilScript" style="white-space:pre-wrap;background:#f3f4f6;padding:10px;border-radius:8px;margin-top:10px;"></pre>
</div>
<h3>Grafik Skor Produk</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("produk")) || [];

function hitungSkor(harga,komisi,rating,terjual,kompetitor){
return (
(komisi*3)+
(rating*10)+
(Math.log(terjual+1)*5)-
(kompetitor*0.5)+
(harga>100000?10:0)
).toFixed(0);
}

function tambahProduk(){
let nama = document.getElementById("nama").value;
let kategori = document.getElementById("kategori").value;
let harga = parseFloat(document.getElementById("harga").value);
let komisi = parseFloat(document.getElementById("komisi").value);
let rating = parseFloat(document.getElementById("rating").value);
let terjual = parseFloat(document.getElementById("terjual").value);
let kompetitor = parseFloat(document.getElementById("kompetitor").value);

let skor = hitungSkor(harga,komisi,rating,terjual,kompetitor);

data.push({nama,kategori,skor});
localStorage.setItem("produk",JSON.stringify(data));

render();
}

function hapus(index){
data.splice(index,1);
localStorage.setItem("produk",JSON.stringify(data));
render();
}

function render(){
let tabel = document.getElementById("tabel");
tabel.innerHTML="";
data.forEach((item,i)=>{
tabel.innerHTML += `
<tr>
<td>${item.nama}</td>
<td>${item.kategori}</td>
<td>${item.skor}</td>
<td><button onclick="hapus(${i})">Hapus</button></td>
</tr>
`;
});

updateChart();
updateTarget();
}

let chart;
function updateChart(){
let ctx = document.getElementById('chart').getContext('2d');
if(chart) chart.destroy();
chart = new Chart(ctx,{
type:'bar',
data:{
labels:data.map(d=>d.nama),
datasets:[{
label:'Skor',
data:data.map(d=>d.skor)
}]
}
});
}

function updateTarget(){
let estimasi = data.reduce((acc,d)=>acc+(d.skor*1000),0);
let persen = Math.min((estimasi/10000000)*100,100);
document.getElementById("progressBar").style.width = persen+"%";
document.getElementById("targetText").innerText =
"Estimasi Potensi: Rp "+estimasi.toLocaleString();
}

render();
function buatScript(){

let nama = document.getElementById("namaScript").value;
let kelebihan = document.getElementById("kelebihanScript").value.split(",");

let hasil = `
🎬 HOOK:
Stop scroll dulu! Ini bisa jadi solusi kamu!

😩 MASALAH:
Banyak orang masih salah pilih produk dan akhirnya nyesel.

✨ SOLUSI:
Aku nemu ${nama} dan ini menarik banget.

🔥 KELEBIHAN:
- ${kelebihan[0] || ""}
- ${kelebihan[1] || ""}
- ${kelebihan[2] || ""}

💰 CTA:
Link ada di keranjang sebelum kehabisan!
`;

document.getElementById("hasilScript").innerText = hasil;
}
</script>

</body>
</html>

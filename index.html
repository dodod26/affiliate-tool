<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Viral Content AI Generator</title>

<style>
body{
font-family:Arial;
background:#f3f4f6;
margin:0;
}

header{
background:#111827;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
}

button{
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.result{
margin-top:20px;
padding:20px;
background:#dcfce7;
border-radius:10px;
}

pre{
white-space:pre-wrap;
}

</style>
</head>

<body>

<header>
<h2>Viral Script AI Generator</h2>
</header>

<div class="container">
<div class="card">

<input id="nama" placeholder="Nama Produk">
<input id="harga" placeholder="Harga">
<input id="rating" placeholder="Rating">
<input id="terjual" placeholder="Jumlah Terjual">

<button onclick="generate()">Analisa & Generate Script</button>

<div id="output"></div>

</div>
</div>

<script>

const URL_SCRIPT="https://script.google.com/macros/s/AKfycbyx79jd0WkDSifTWiomOeFuyAKnGjf3Whu3x_wbAli4OwoMjlsVQYZ6xufhd6U6Wdci/exec"

async function generate(){

let nama=document.getElementById("nama").value
let harga=document.getElementById("harga").value
let rating=document.getElementById("rating").value
let terjual=document.getElementById("terjual").value

document.getElementById("output").innerHTML="AI sedang membuat script..."

await fetch(URL_SCRIPT,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
nama:nama,
harga:harga,
rating:rating,
terjual:terjual
})
})
  
let data={
status:"Analisa selesai",
script:"Script berhasil dibuat & dikirim ke Google Sheet"
}

document.getElementById("output").innerHTML=`

<div class="result">

<h3>Status Produk</h3>
<b>${data.status}</b>

<h3>Script Konten</h3>

<pre>${data.script}</pre>

</div>

`

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GaptekNiih Home Viral Scanner PRO</title>

<style>
body{font-family:Arial;margin:0;background:#f3f4f6;}
header{background:#111827;color:white;text-align:center;padding:20px;}
.container{max-width:900px;margin:auto;padding:15px;}
.card{background:white;padding:15px;margin-bottom:15px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
input{width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ddd;}
button{padding:10px;background:#2563eb;color:white;border:none;border-radius:6px;cursor:pointer;margin-top:5px;margin-right:5px;}
.result{padding:10px;border-radius:8px;margin-top:10px;}
.green{background:#dcfce7;}
.orange{background:#fef3c7;}
.red{background:#fee2e2;}
pre{white-space:pre-wrap;}
footer{text-align:center;padding:15px;font-size:12px;opacity:0.6;}
</style>
</head>

<body>

<header>
<div style="font-size:24px;font-weight:bold;">GaptekNiih</div>
<div style="font-size:14px;opacity:0.7;">Home Viral Scanner AUTO VARIASI</div>
</header>

<div class="container">
<div class="card">

<h3>Input Data Produk</h3>

<input id="nama" placeholder="Nama Produk">
<input id="harga" type="number" placeholder="Harga">
<input id="komisi" type="number" placeholder="Komisi %">
<input id="rating" type="number" step="0.1" placeholder="Rating">
<input id="terjual" type="number" placeholder="Jumlah Terjual">
<input id="kompetitor" type="number" placeholder="Perkiraan Kompetitor">

<button onclick="analisa()">Analisa & Buat Script</button>
<button onclick="generateHookBaru()">Generate Hook Baru Lagi</button>

<div id="output"></div>

</div>
</div>

<footer>Dibuat oleh GaptekNiih</footer>

<script>

let globalData = {};
let globalStatus = "";
let globalWarna = "";

/* ============================= */
/* KIRIM KE GOOGLE SHEET */
/* ============================= */

async function kirimKeSheet(nama,harga,rating,terjual,script,status){

const url="https://script.google.com/macros/s/AKfycbxrUCoBw0FS4zLUH9rkvYmX_2wsp1giK-jOAkI27oVuBV8CBPHWAdzE8l-carVx631t/exec";

const data={
nama:nama,
harga:harga,
rating:rating,
terjual:terjual,
masalah:"Rumah tangga",
script:script,
status:status
};

await fetch(url,{
method:"POST",
mode:"no-cors",
body:JSON.stringify(data)
});

}

/* ============================= */
/* ANALISA PRODUK */
/* ============================= */

function analisa(){

let nama=document.getElementById("nama").value;
let harga=parseFloat(document.getElementById("harga").value);
let komisi=parseFloat(document.getElementById("komisi").value);
let rating=parseFloat(document.getElementById("rating").value);
let terjual=parseFloat(document.getElementById("terjual").value);
let kompetitor=parseFloat(document.getElementById("kompetitor").value);

let skor=0;

if(harga<=200000) skor+=20;
if(komisi>=10) skor+=20;
if(rating>=4.7) skor+=20;
if(terjual>=500) skor+=20;
if(kompetitor<=200) skor+=20;

if(skor>=80){
globalStatus="POTENSI VIRAL KUAT";
globalWarna="green";
}
else if(skor>=50){
globalStatus="LAYAK DICOBA";
globalWarna="orange";
}
else{
globalStatus="RESIKO TINGGI";
globalWarna="red";
}

globalData={nama,harga,rating,terjual};

generateHookBaru();

}

/* ============================= */
/* GENERATE SCRIPT */
/* ============================= */

function generateHookBaru(){

if(!globalData.nama){
alert("Isi data dulu lalu klik Analisa 😁");
return;
}

let hooks=[
`Baru tau ternyata ada ${globalData.nama} kayak gini.`,
`Serius baru nemu produk ini sekarang.`,
`Awalnya kupikir ini produk biasa.`,
`Ternyata ada barang kayak gini juga.`,
`Ini kecil tapi ternyata kepake banget.`
];

let ctas=[
`Linknya aku taruh di keranjang.`,
`Kalau penasaran cek link keranjang.`,
`Detail produk ada di keranjang.`,
`Bisa cek produknya di keranjang.`,
`Linknya ada di bawah ya.`
];

let captions=[
`Baru tau ada produk kayak gini dan ternyata cukup kepake di rumah.`,
`Produk simpel tapi ternyata membantu banget.`,
`Kadang solusi rumah tangga itu sesimpel ini.`,
`Barang kecil tapi ternyata sering dipakai.`,
`Ini salah satu produk rumah yang underrated.`
];

let hashtags=[
`#racunshopee #produkviral #shopeefinds #belanjashopee`,
`#racunshopee #barangviral #shopeehaul #shopeeaffiliate`,
`#racunshopee #produkshopee #barangrumah #belanjashopee`,
`#racunshopee #produkviral #tipsrumah #shopeefinds`
];

let hook=hooks[Math.floor(Math.random()*hooks.length)];
let cta=ctas[Math.floor(Math.random()*ctas.length)];
let caption=captions[Math.floor(Math.random()*captions.length)];
let hashtag=hashtags[Math.floor(Math.random()*hashtags.length)];

let voiceover=`
${hook}

Awalnya kupikir ini cuma produk biasa.

Tapi ternyata cukup membantu dipakai di rumah.

Harganya sekitar Rp ${globalData.harga}.

Ratingnya ${globalData.rating} dan yang beli sudah ${globalData.terjual}+.

${cta}
`;

let teksVideo=`
Produk simpel tapi kepake

Harga Rp ${globalData.harga}

Rating ${globalData.rating}

Sudah dibeli ${globalData.terjual}+

Cek keranjang
`;

let judulShopee=`
Produk rumah tangga yang ternyata kepake banget
`;

let scriptGabung=`

VOICE OVER
${voiceover}

----------------------------

TEKS VIDEO
${teksVideo}

----------------------------

JUDUL VIDEO
${judulShopee}

----------------------------

CAPTION
${caption}

----------------------------

HASHTAG
${hashtag}

`;

/* OUTPUT KE LAYAR */

document.getElementById("output").innerHTML=`

<div class="result ${globalWarna}">

<b>Status:</b> ${globalStatus}

<br><br>

<b>🎙 Voice Over</b>
<pre>${voiceover}</pre>

<b>📝 Teks Video</b>
<pre>${teksVideo}</pre>

<b>🎬 Judul Shopee Video</b>
<pre>${judulShopee}</pre>

<b>📄 Caption</b>
<pre>${caption}</pre>

<b>🔥 Hashtag</b>
<pre>${hashtag}</pre>

</div>

`;

/* KIRIM KE SHEET */

kirimKeSheet(
globalData.nama,
globalData.harga,
globalData.rating,
globalData.terjual,
scriptGabung,
globalStatus
);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GaptekNiih Viral Scanner</title>

<style>
body{font-family:Arial;margin:0;background:#f3f4f6;}
header{background:#111827;color:white;text-align:center;padding:20px;}
.container{max-width:900px;margin:auto;padding:15px;}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
input{width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ddd;}
button{padding:10px;background:#2563eb;color:white;border:none;border-radius:6px;margin-top:5px;cursor:pointer;}
.result{padding:15px;border-radius:10px;margin-top:15px;}
.green{background:#dcfce7;}
.orange{background:#fef3c7;}
.red{background:#fee2e2;}
pre{white-space:pre-wrap;}
</style>
</head>

<body>

<header>
<h2>GaptekNiih Viral Scanner</h2>
<p>Shopee Affiliate AI Script Generator</p>
</header>

<div class="container">
<div class="card">

<h3>Input Data Produk</h3>

<input id="nama" placeholder="Nama Produk">
<input id="harga" placeholder="Harga">
<input id="rating" placeholder="Rating">
<input id="terjual" placeholder="Jumlah Terjual">

<button onclick="generate()">Analisa Produk</button>

<div id="output"></div>

</div>
</div>

<script>

const API_KEY="AIzaSyAbCw7li3GJ6ZiZz26V2T3RmlKYufbI68c"

/* ================== GENERATE ================== */

async function generate(){

let nama=document.getElementById("nama").value
let harga=document.getElementById("harga").value
let rating=document.getElementById("rating").value
let terjual=document.getElementById("terjual").value

if(!nama){
alert("Isi nama produk dulu")
return
}

document.getElementById("output").innerHTML="AI sedang menganalisa produk..."

let prompt=`
Analisa produk shopee affiliate.

Produk: ${nama}
Harga: ${harga}
Rating: ${rating}
Terjual: ${terjual}

Buatkan:

1 Masalah yang sering dialami orang
Script video affiliate (storytelling natural)
Status produk: GAS / COBA / RESIKO

gunakan gaya bahasa santai seperti kreator tiktok indonesia.
`

try{

let response=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[{
parts:[{text:prompt}]
}]
})
})

let data=await response.json()

let hasil=data.candidates[0].content.parts[0].text

tampilkan(hasil,"green")

kirimSheet(nama,harga,rating,terjual,"AI Analisa",hasil,"AI")

}catch(e){

fallbackScript(nama,harga,rating,terjual)

}

}

/* ================== FALLBACK ================== */

function fallbackScript(nama,harga,rating,terjual){

let masalah="Orang sering butuh produk praktis tapi tidak tahu solusi simpel."

let script=`
Baru tau ternyata ada ${nama} kayak gini.

Awalnya kupikir ini produk biasa.

Tapi ternyata cukup membantu dipakai di rumah.

Harganya sekitar Rp ${harga}.

Ratingnya ${rating} dan yang beli sudah ${terjual}+.

Linknya aku taruh di keranjang.
`

let status="COBA"

let hasil=`

MASALAH
${masalah}

SCRIPT
${script}

STATUS PRODUK
${status}

`

tampilkan(hasil,"orange")

kirimSheet(nama,harga,rating,terjual,masalah,script,status)

}

/* ================== TAMPILKAN ================== */

function tampilkan(teks,warna){

document.getElementById("output").innerHTML=`

<div class="result ${warna}">

<pre>${teks}</pre>

</div>
`

}

/* ================== GOOGLE SHEET ================== */

function kirimSheet(nama,harga,rating,terjual,masalah,script,status){

let tanggal=new Date().toLocaleString()

fetch("https://script.google.com/macros/s/AKfycbxrUCoBw0FS4zLUH9rkvYmX_2wsp1giK-jOAkI27oVuBV8CBPHWAdzE8l-carVx631t/exec",{

method:"POST",
mode:"no-cors",

body:JSON.stringify({

nama:nama,
harga:harga,
rating:rating,
terjual:terjual,
masalah:masalah,
script:script,
tanggal:tanggal,
status:status

})

})

}

</script>

</body>
</html>
